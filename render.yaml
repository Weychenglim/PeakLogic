services:
  - type: web
    name: peaklogic-api
    env: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGINS
        sync: false
